# Default values for showcase-insurance-claims

# Namespace for all resources
namespace: showcase-insurance-claims

# Image configurations
images:
  # Claims voice agent (custom implementation)
  voiceAgent:
    repository: ghcr.io/agentic-layer/showcase-insurance-claims-voice-agent
    tag: latest

  # Frontend React application
  frontend:
    repository: ghcr.io/agentic-layer/showcase-insurance-claims-frontend
    tag: latest

  # Customer database MCP server
  customerDatabase:
    repository: ghcr.io/agentic-layer/showcase-insurance-claims-customer-database
    tag: latest

  # Template-based ADK agent (keep empty to use default from agentic-layer)
  agentTemplateAdk:
    repository: ''
    tag: ''

# Common configuration for agents
config:
  logLevel: DEBUG
  otelEnabled: true

# External dependencies (must exist before installing this chart)
# These are NOT created by this chart - they must be provisioned separately
externalDependencies:
  # API keys (GEMINI_API_KEY)
  apiKeySecret:
    name: api-key-secrets
    key: GEMINI_API_KEY

# Tool Gateway reference used by ToolRoute resources to expose tool servers.
# Leave ref empty to let the tool-gateway operator resolve the default ToolGateway
# (a ToolGateway in the well-known "tool-gateway" namespace).
# Override to pin to a specific ToolGateway, e.g.:
#   ref:
#     name: tool-gateway
#     namespace: tool-gateway
toolGateway:
  ref: {}

# Extra environment variables applied to all agents and tool servers
# Example:
#  - name: OTEL_EXPORTER_OTLP_PROTOCOL
#    value: "http/protobuf"
#  - name: OTEL_EXPORTER_OTLP_ENDPOINT
#    value: "http://lgtm.monitoring.svc.cluster.local:4318"
extraEnv: []
